<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Календар Ліцей ЕІТ Online</title>
  <link rel="stylesheet" href="style.css">
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
</head>
<body>

  <div id='calendar'></div>
<div id="modalOverlay" style="display: none;">
  <div id="eventModal">
    <h3>Новий запис</h3>
    <input type="text" id="eventTitle" placeholder="Назва уроку або подкасту">
    
    <div style="margin-top: 15px;">
      <label>Колір:</label>
      <select id="eventColor">
        <option value="#28a745">Зелений (Урок)</option>
        <option value="#3788d8">Синій (Монтаж)</option>
        <option value="#ff9f89">Персиковий (Подкаст)</option>
        <option value="#ffc107">Жовтий (Підготовка)</option>
      </select>
    </div>

    <div class="modal-buttons">
      <button id="btnCancel">Скасувати</button>
      <button id="btnSave">Зберегти</button>
    </div>
  </div>
</div>
  <script>
// Змінна для збереження даних виділення, поки відкрита модалка
let selectedInfo = null;

// Оновлюємо налаштування календаря всередині FullCalendar.Calendar:
// ...
    select: function(info) {
      selectedInfo = info; // Запам'ятовуємо, який час виділив користувач
      document.getElementById('modalOverlay').style.display = 'flex'; // Показуємо модалку
      document.getElementById('eventTitle').value = ''; // Очищуємо поле
      document.getElementById('eventTitle').focus();
    },
// ...

// ЛОГІКА КНОПОК МОДАЛКИ (додайте це в кінці всередині DOMContentLoaded)

// Кнопка "Скасувати"
document.getElementById('btnCancel').onclick = function() {
  document.getElementById('modalOverlay').style.display = 'none';
  calendar.unselect();
};

// Кнопка "Зберегти"
document.getElementById('btnSave').onclick = function() {
  let title = document.getElementById('eventTitle').value;
  let color = document.getElementById('eventColor').value;

  if (title && selectedInfo) {
    calendar.addEvent({
      id: String(Date.now()),
      title: title,
      start: selectedInfo.startStr,
      end: selectedInfo.endStr,
      backgroundColor: color,
      borderColor: color
    });
    
    saveEvents(); // Зберігаємо в LocalStorage
  }

  document.getElementById('modalOverlay').style.display = 'none';
  calendar.unselect();
};
  </script>

</body>
</html>
