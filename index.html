<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Studio Manager v7.7 | Fixed Analytics</title>
  <link rel="stylesheet" href="style.css">
  
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div id="loginScreen">
    <div class="login-box">
      <h2>Liceum EIT</h2>
      <input type="password" id="passInput" placeholder="Код доступу">
      <button class="btn btn-primary" onclick="tryLogin()">Увійти</button>
    </div>
  </div>

  <div id="topBar" style="display: none;">
    <div class="brand">STUDIO MANAGER</div>
    <div class="user-controls">
      <span id="roleBadge" class="badge"></span> 
      <button onclick="logout()" class="btn-logout">Вихід</button>
    </div>
  </div>

  <div id="statusBar" style="display: none;"></div>

  <div class="container" id="mainApp" style="display: none;">
    <div id='calendar'></div>
    
    <div class="sidebar">
      <details id="tgPanel" class="sidebar-panel" style="display:none; border-left: 4px solid #0088cc;">
        <summary>✈️ Налаштування Telegram</summary>
        <div class="panel-content">
          <label>BOT TOKEN</label>
          <input type="password" id="tgToken">
          <label>CHAT ID</label>
          <input type="text" id="tgChatId">
          <button class="btn btn-primary" onclick="saveTgSettings()">Зберегти</button>
        </div>
      </details>

      <details class="sidebar-panel" open>
        <summary>🔍 Фільтр викладачів</summary>
        <div class="panel-content">
          <div id="filterList" class="filter-container"></div>
          <button class="btn btn-light" style="margin-top:10px" onclick="resetFilters()">Скинути все</button>
        </div>
      </details>

      <div class="sidebar-panel">
        <h4>📊 Звітність</h4>
        <div class="panel-content">
          <button class="btn btn-primary" onclick="openReport()">Відкрити аналітику</button>
        </div>
      </div>

      <details class="sidebar-panel">
        <summary>👥 База викладачів</summary>
        <div class="panel-content">
          <div id="teacherList"></div>
          <div style="margin-top:10px; display:flex; gap:5px;">
            <input type="text" id="newTeacherName" placeholder="Ім'я">
            <button class="btn btn-primary" style="width:auto;" onclick="addTeacher()">+</button>
          </div>
        </div>
      </details>
    </div>
  </div>

  <div id="reportOverlay" class="overlay">
    <div class="modal-content" style="max-width:900px;">
      <h3>📊 Статистика за період</h3>
      <div style="height: 250px; margin-bottom: 20px;">
        <canvas id="reportChart"></canvas>
      </div>
      <div class="table-wrapper" id="reportResult"></div>
      <button class="btn btn-primary" style="margin-top:20px;" onclick="closeReport()">Закрити</button>
    </div>
  </div>

<div id="modalOverlay" class="overlay">
  <div class="modal-content modern-modal">
    <div class="modal-header">
      <h3>Новий запис</h3>
      <div id="adminBlockOptions" style="display:none;">
        <label class="switch">
          <input type="checkbox" id="isBlockTime" onchange="toggleBlockUI(this.checked)">
          <span class="slider round"></span>
          <span class="switch-label">Технічна пауза</span>
        </label>
      </div>
    </div>

    <div class="modal-body">
      <div class="input-grid">
        <div class="input-group">
          <label>🕒 Початок</label>
          <input type="time" id="startTimeInput">
        </div>
        <div class="input-group">
          <label>🕒 Кінець</label>
          <input type="time" id="endTimeInput">
        </div>
      </div>

      <div id="bookingFields">
        <div class="input-group">
          <label>👤 Викладач</label>
          <div style="display: flex; gap: 10px; align-items: center;">
            <select id="eventTeacher" style="margin:0;"></select>
            <input type="color" id="eventColor" value="#4F46E5" class="compact-color">
          </div>
        </div>

        <div class="input-group">
          <label>📚 Предмет</label>
          <input type="text" id="eventTitle" placeholder="Напр. Математика">
        </div>

        <div class="input-grid">
          <div class="input-group">
            <label>🏫 Клас</label>
            <input type="text" id="eventClass" placeholder="11-Б">
          </div>
          <div class="input-group">
            <label>🔢 Уроків</label>
            <input type="number" id="eventCount" value="1" min="1">
          </div>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Скасувати</button>
      <button class="btn btn-primary" onclick="confirmBooking()">Зберегти запис</button>
    </div>
  </div>
</div>
<div id="statusModalOverlay" class="overlay">
  <div class="modal-content modern-modal">
    <div class="modal-header">
      <h3>Керування уроком</h3>
      <span id="statusTeacherName" class="badge" style="background: #E0E7FF; color: #4F46E5;"></span>
    </div>

    <div class="modal-body">
      <div class="status-info-box">
        <span id="statusEventTitle">Назва предмета</span>
      </div>

      <div class="input-group">
        <label>Змінити статус</label>
        <select id="eventStatus">
            <option value="">🟢 Все за планом</option>
            <option value="✅ Проведено">✅ Проведено</option>
            <option value="🏃 Запізнююсь (10 хв)">🏃 Запізнююсь (10 хв)</option>
            <option value="⏳ Запізнююсь (15+ хв)">⏳ Запізнююсь (15+ хв)</option>
            <option value="❌ Скасовано">❌ Скасовано</option>
        </select>
      </div>
    </div>

    <div class="modal-footer" style="flex-direction: column; gap: 10px;">
      <button class="btn btn-primary" onclick="applyStatus()">Оновити статус</button>
      <div style="display: flex; gap: 10px; width: 100%;">
          <button class="btn btn-secondary" style="flex: 1;" onclick="closeStatusModal()">Закрити</button>
          <button id="btnDeleteEvent" class="btn btn-danger" style="flex: 1; display: none;" onclick="handleDelete()">🗑 Видалити</button>
      </div>
    </div>
  </div>
</div>
  <script src="script.js"></script>
</body>
</html>
