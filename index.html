<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Liceum Manager v10.0</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="/favicon.jpg">
  
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

  <div id="loginScreen">
    <div class="login-box">
      <h2>Liceum EIT</h2>
      <input type="password" id="passInput" placeholder="Код доступу">
      <button class="btn btn-primary" onclick="tryLogin()">Увійти</button>
      <p id="loginStatus" style="margin-top:10px; font-size:12px; color:#aaa;"></p>
    </div>
  </div>

  <div id="topBar" style="display: none;">
    <div class="brand">LICEUM MANAGER</div>
    <div class="user-controls">
      <button onclick="openSettings()" class="btn-icon">⚙️</button>
      <span id="roleBadge" class="badge">Guest</span> 
      <button onclick="logout()" class="btn-logout">Вихід</button>
    </div>
  </div>

  <div id="mainContainer" style="display: none;">
    <div id="calendar"></div>
  </div>

  <div id="eventModalOverlay" class="overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Запланувати урок</h3>
        <button onclick="closeModal('eventModalOverlay')">✕</button>
      </div>
      <div class="modal-body">
        
        <div class="input-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
            <label style="margin:0">Предмет</label>
            <span onclick="toggleSubjectMode()" style="font-size: 11px; color: #4F46E5; cursor: pointer; text-decoration: underline;">
              Свій варіант / Список
            </span>
          </div>
          <select id="eventSubjectSelect" class="form-control">
            <option value="Математика">Математика</option>
            <option value="Укр. мова">Укр. мова</option>
            <option value="Англійська">Англійська</option>
            <option value="Історія">Історія</option>
            <option value="Фізика">Фізика</option>
            <option value="Хімія">Хімія</option>
            <option value="Біологія">Біологія</option>
            <option value="Інформатика">Інформатика</option>
            <option value="Інше">Інше</option>
          </select>
          <input type="text" id="eventSubjectInput" class="form-control" placeholder="Введіть назву" style="display: none;">
        </div>

        <div class="input-group">
          <label>Клас / Учень</label>
          <input type="text" id="eventClass" class="form-control" placeholder="Напр: 10-А">
        </div>
        <div class="input-group">
          <label>Коментар (тема)</label>
          <input type="text" id="eventTitle" class="form-control" placeholder="Додатково...">
        </div>

        <div class="input-grid">
          <div class="input-group">
            <label>Тривалість</label>
            <select id="eventDuration" class="form-control">
              <option value="45">45 хв</option>
              <option value="60" selected>60 хв</option>
              <option value="90">90 хв</option>
              <option value="120">120 хв</option>
            </select>
          </div>
          <div class="input-group">
            <label>Тип</label>
            <select id="eventType" class="form-control">
              <option value="lesson">Урок</option>
              <option value="tech">Тех. перерва</option>
            </select>
          </div>
        </div>

        <div id="editActions" style="display:none; margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
           <label>Змінити статус:</label>
           <div style="display:flex; gap:5px; flex-wrap:wrap; margin-bottom:10px;">
             <button class="btn-status" onclick="updateStatus('✅ Проведено')">✅ Проведено</button>
             <button class="btn-status" onclick="updateStatus('❌ Скасовано')">❌ Скасовано</button>
             <button class="btn-status" onclick="updateStatus('🏃 Запізнення')">🏃 Запізнення</button>
           </div>
           <button class="btn-danger" onclick="deleteEvent()" style="width:100%">🗑 Видалити урок</button>
        </div>

      </div>
      <div class="modal-footer">
        <button id="saveBtn" class="btn btn-primary" style="width: 100%" onclick="saveEvent()">Зберегти</button>
      </div>
    </div>
  </div>

  <div id="settingsModal" class="overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Налаштування</h3>
        <button onclick="closeModal('settingsModal')">✕</button>
      </div>
      <div class="modal-body">
        <h4>📢 Telegram Сповіщення</h4>
        <p style="font-size:11px; color:#666; margin-bottom:10px;">Введіть дані вашого бота, щоб отримувати сповіщення про нові уроки.</p>
        
        <div class="input-group">
          <label>Bot Token</label>
          <input type="text" id="tgTokenInput" class="form-control" placeholder="123456:ABC-DEF...">
        </div>
        <div class="input-group">
          <label>Chat ID (або Channel ID)</label>
          <input type="text" id="tgChatIdInput" class="form-control" placeholder="-10012345678">
        </div>

        <hr>
        <h4>🔑 Зміна паролів</h4>
        <div class="input-group">
            <label>Роль</label>
            <select id="roleSelect" class="form-control">
                <option value="teacher">Вчитель</option>
                <option value="admin">Адмін</option>
            </select>
        </div>
        <div class="input-group">
            <label>Новий код доступу</label>
            <input type="text" id="newPassInput" class="form-control" placeholder="Новий код">
        </div>
        <button class="btn btn-secondary" onclick="updateUserPass()" style="width:100%">Оновити пароль</button>

      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" style="width: 100%" onclick="saveSettings()">Зберегти налаштування</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
