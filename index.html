<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Liceum Manager v8.0 (Updated)</title>
  <link rel="stylesheet" href="style.css">
  
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="script.js" defer></script>
</head>
<body>

  <div id="loginScreen">
    <div class="login-box">
      <h2>Liceum EIT</h2>
      <input type="password" id="passInput" placeholder="Код доступу">
      <button class="btn btn-primary" onclick="tryLogin()">Увійти</button>
    </div>
  </div>

  <div id="topBar" style="display: none;">
    <div class="brand">LICEUM STUDIO MANAGER</div>
    <div class="user-controls">
      <span id="roleBadge" class="badge"></span> 
      <button onclick="logout()" class="btn-logout">Вихід</button>
    </div>
  </div>

  <div id="statusBar" style="display: none;"></div>

  <div class="container" id="mainApp" style="display: none;">
    <div id="calendar"></div>

    <div class="sidebar">
      <div class="sidebar-panel">
        <details open>
          <summary>🔍 Фільтр по вчителю</summary>
          <div class="panel-content">
             <div class="filter-container" id="filterList"></div>
             <button class="btn btn-light" onclick="resetFilters()">Показати всіх</button>
          </div>
        </details>
      </div>

      <div class="sidebar-panel" id="reportPanel">
        <div class="panel-content">
            <button class="btn btn-primary" onclick="openReport()">📊 Звітність</button>
        </div>
      </div>

      <div class="sidebar-panel">
        <details>
          <summary>⚙️ Налаштування</summary>
          <div class="panel-content">
            <h4>Вчителі</h4>
            <div id="teacherList" style="margin-bottom: 10px;"></div>
            <div class="input-group">
                <input type="text" id="newTeacherName" placeholder="Ім'я">
                <button class="btn btn-success" onclick="addTeacher()">+ Додати</button>
            </div>
            <hr>
            <div id="passwordSettings" style="display: none;">
                <h4>Керування кодами (Технік)</h4>
                <div class="input-group"><label>Технік</label><input type="text" id="codeTech" placeholder="Новий код"></div>
                <div class="input-group"><label>Адмін</label><input type="text" id="codeAdmin" placeholder="Новий код"></div>
                <div class="input-group"><label>Викладач</label><input type="text" id="codeTeacher" placeholder="Новий код"></div>
                <button class="btn btn-secondary" onclick="updateAllCodes()">Оновити всі коди</button>
            </div>
          </div>
        </details>
      </div>
    </div>
  </div>

  <div id="modalOverlay" class="overlay">
    <div class="modal-content modern-modal">
      <div class="modal-header">
        <h3>Новий запис</h3>
        <button onclick="closeModal()" style="border:none; background:none; font-size:20px; cursor:pointer;">✕</button>
      </div>
      <div class="modal-body">
        <div class="input-grid">
            <div class="input-group"><label>Початок</label><input type="time" id="startTimeInput"></div>
            <div class="input-group"><label>Кінець</label><input type="time" id="endTimeInput"></div>
        </div>

        <div id="adminBlockOptions" style="margin-bottom: 15px; padding: 10px; background: #fee2e2; border-radius: 8px; display: none;">
            <label class="switch">
                <input type="checkbox" id="isBlockTime" onchange="toggleBlockUI(this.checked)">
                <span class="slider"></span>
                <span class="switch-label">⛔ Технічна перерва</span>
            </label>
        </div>
        
        <div id="bookingFields">
            <div class="input-group">
                <label>Предмет</label>
                <input type="text" id="eventSubject" list="subjectsList" placeholder="Оберіть або введіть назву...">
                <datalist id="subjectsList">
                    <option value="Математика">
                    <option value="Українська мова">
                    <option value="Англійська мова">
                    <option value="Історія України">
                    <option value="Фізика">
                    <option value="Хімія">
                    <option value="Біологія">
                    <option value="Географія">
                </datalist>
            </div>

            <div class="input-grid">
                <div class="input-group">
                    <label>Клас / Група</label>
                    <input type="text" id="eventClass" placeholder="Напр. 11-А">
                </div>
                <div class="input-group">
                    <label>Вчитель</label>
                    <select id="eventTeacher"></select>
                </div>
            </div>

            <div class="input-grid">
                <div class="input-group"><label>К-сть уроків</label><input type="number" id="eventCount" value="1"></div>
                <div class="input-group">
                    <label>Колір</label>
                    <select id="eventColor">
                        <option value="#4F46E5">🔵 Стандарт</option>
                        <option value="#F59E0B">🟠 Важливо</option>
                        <option value="#EC4899">🌸 Додатковий</option>
                    </select>
                </div>
            </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Скасувати</button>
        <button class="btn btn-primary" onclick="confirmBooking()">Зберегти</button>
      </div>
    </div>
  </div>

  <div id="statusModalOverlay" class="overlay">
    <div class="modal-content modern-modal">
        <div class="modal-header"><h3>Керування</h3></div>
        <div class="modal-body">
            <h4 id="statusEventTitle">Назва уроку</h4>
            <select id="eventStatus">
                <option value="">🟢 Все за планом</option>
                <option value="✅ Проведено">✅ Проведено</option>
                <option value="❌ Скасовано">❌ Скасовано</option>
            </select>
        </div>
        <div class="modal-footer">
            <button class="btn btn-primary" onclick="applyStatus()">Оновити</button>
            <button id="btnDeleteEvent" class="btn btn-danger" onclick="handleDelete()">Видалити</button>
            <button class="btn btn-secondary" onclick="closeStatusModal()">Закрити</button>
        </div>
    </div>
  </div>

  <div id="reportOverlay" class="overlay">
    <div class="modal-content" style="max-width: 800px;">
        <div class="modal-header"><h3>Аналітика</h3><button onclick="closeReport()">✕</button></div>
        <div class="modal-body">
            <div id="reportResult"></div>
            <canvas id="reportChart" style="height:300px;"></canvas>
        </div>
    </div>
  </div>

</body>
</html>
