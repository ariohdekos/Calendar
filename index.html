<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Liceum EIT | Cloud Edition</title>
  <link rel="stylesheet" href="style.css">
  
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="icon" type="image/png" href="/favicon.jpg">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

  <div id="loginScreen">
    <div class="login-box">
      <h2>Liceum EIT</h2>
      <input type="password" id="passInput" placeholder="Код доступу">
      <button class="btn btn-primary" onclick="tryLogin()">Увійти</button>
      <p id="loadingStatus" style="font-size: 11px; color: #666; margin-top: 10px;">Підключення до бази...</p>
    </div>
  </div>

  <div id="topBar" style="display: none;">
    <div class="brand">STUDIO MANAGER</div>
    <div class="user-controls">
      <span id="roleBadge" class="badge"></span> 
      <button onclick="logout()" class="btn-logout">Вихід</button>
    </div>
  </div>

  <div id="statusBar" style="display: none;"></div>

  <div class="container" id="mainApp" style="display: none;">
    <div id='calendar'></div>
    
    <div class="sidebar">
      <details id="tgPanel" class="sidebar-panel" style="display:none; border-left: 4px solid #0088cc;">
        <summary>⚙️ Керування системою</summary>
        <div class="panel-content">
          <label>BOT TOKEN</label>
          <input type="password" id="tgToken">
          <label>CHAT ID</label>
          <input type="text" id="tgChatId">
          <button class="btn btn-primary" onclick="saveTgSettings()">Зберегти Cloud TG</button>
          <hr>
          <label>Зміна кодів доступу</label>
          <div style="display: flex; gap: 5px; margin-bottom: 5px;">
            <input type="text" id="newCodeVal" placeholder="Новий код">
            <select id="codeLevel">
                <option value="tech">Технік</option>
                <option value="admin">Адмін</option>
                <option value="teacher">Вчитель</option>
            </select>
          </div>
          <button class="btn btn-light" onclick="updateAccessCodeCloud()">Оновити пароль</button>
        </div>
      </details>

      <details class="sidebar-panel" open>
        <summary>🔍 Фільтр викладачів</summary>
        <div class="panel-content">
          <div id="filterList" class="filter-container"></div>
          <button class="btn btn-light" style="margin-top:10px" onclick="resetFilters()">Скинути</button>
        </div>
      </details>

      <div class="sidebar-panel">
        <h4>📊 Звітність</h4>
        <button class="btn btn-primary" style="width: 90%; margin: 10px 5%;" onclick="openReport()">Аналітика</button>
      </div>

      <details class="sidebar-panel">
        <summary>👥 База викладачів</summary>
        <div class="panel-content">
          <div id="teacherList"></div>
          <div style="margin-top:10px; display:flex; gap:5px;">
            <input type="text" id="newTeacherName" placeholder="Прізвище">
            <button class="btn btn-primary" style="width:auto;" onclick="addTeacher()">+</button>
          </div>
        </div>
      </details>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
