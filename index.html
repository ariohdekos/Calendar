<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Liceum Manager v10.2</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="/favicon.jpg">
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

  <div id="loginScreen">
    <div class="login-box">
      <h2>Liceum EIT</h2>
      <input type="password" id="passInput" placeholder="Код доступу">
      <button class="btn btn-primary" onclick="tryLogin()">Увійти</button>
    </div>
  </div>

  <div id="topBar" style="display: none;">
    <div class="brand">LICEUM MANAGER</div>
    <div class="user-controls">
      <button id="settingsBtn" onclick="openSettings()" class="btn-icon" style="display: none;">⚙️</button>
      <button id="reportBtn" onclick="openReport()" class="btn-icon" style="display: none;">📊</button>
      <span id="roleBadge" class="badge"></span> 
      <button onclick="logout()" class="btn-logout">Вихід</button>
    </div>
  </div>

  <div id="mainContainer" style="display: none;">
    <div id="calendar"></div>
  </div>

  <div id="eventModalOverlay" class="overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Запланувати урок</h3>
        <button onclick="closeModal('eventModalOverlay')">✕</button>
      </div>
      <div class="modal-body">
        <div class="input-group">
          <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
            <label>Предмет</label>
            <span onclick="toggleSubjectMode()" style="font-size: 11px; color:#4F46E5; cursor:pointer;">Свій / Список</span>
          </div>
          <select id="eventSubjectSelect" class="form-control">
            <option value="Математика">Математика</option>
            <option value="Укр. мова">Укр. мова</option>
            <option value="Англійська">Англійська</option>
            <option value="Історія">Історія</option>
            <option value="Фізика">Фізика</option>
            <option value="Хімія">Хімія</option>
            <option value="Біологія">Біологія</option>
            <option value="Інформатика">Інформатика</option>
            <option value="Початкова школа">Початкова школа</option>
            <option value="Інше">Інше</option>
          </select>
          <input type="text" id="eventSubjectInput" class="form-control" style="display:none;" placeholder="Назва предмету">
        </div>
        <div class="input-group"><label>Клас / Учень</label><input type="text" id="eventClass" class="form-control"></div>
        <div class="input-group"><label>Коментар</label><input type="text" id="eventTitle" class="form-control"></div>
        <div class="input-grid">
          <div class="input-group"><label>Тривалість</label>
            <select id="eventDuration" class="form-control">
              <option value="45">45 хв</option><option value="60" selected>60 хв</option><option value="90">90 хв</option><option value="120">120 хв</option>
            </select>
          </div>
          <div class="input-group"><label>Тип</label>
            <select id="eventType" class="form-control">
              <option value="lesson">Урок</option><option value="tech">Тех. перерва</option>
            </select>
          </div>
        </div>
        <div id="editActions" style="display:none; padding-top:10px; border-top:1px solid #eee;">
           <label>Статус:</label>
           <div style="display:flex; gap:5px; flex-wrap:wrap;">
             <button class="btn-status" onclick="updateStatus('✅ Проведено')">✅ Проведено</button>
             <button class="btn-status" onclick="updateStatus('❌ Скасовано')">❌ Скасовано</button>
           </div>
           <button class="btn-danger btn" onclick="deleteEvent()">🗑 Видалити</button>
        </div>
      </div>
      <div class="modal-footer"><button id="saveBtn" class="btn btn-primary" onclick="saveEvent()">Зберегти</button></div>
    </div>
  </div>

  <div id="settingsModal" class="overlay">
    <div class="modal-content">
      <div class="modal-header"><h3>⚙️ Налаштування</h3><button onclick="closeModal('settingsModal')">✕</button></div>
      <div class="modal-body">
        <h4>Telegram</h4>
        <input type="text" id="tgTokenInput" class="form-control" placeholder="Bot Token" style="margin-bottom:10px;">
        <input type="text" id="tgChatIdInput" class="form-control" placeholder="Chat ID">
        <button class="btn btn-primary" onclick="saveSettings()" style="margin-top:10px;">Зберегти TG</button>
        <hr>
        <h4>Паролі</h4>
        <select id="roleSelect" class="form-control" style="margin-bottom:10px;">
            <option value="teacher">Викладач</option><option value="admin">Адмін</option><option value="tech">Технік</option>
        </select>
        <input type="text" id="newPassInput" class="form-control" placeholder="Новий код">
        <button class="btn btn-secondary" onclick="updateUserPass()" style="margin-top:10px; width:100%">Оновити пароль</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
