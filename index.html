<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Liceum Manager v7.7</title>
  
  <link rel="stylesheet" href="style.css?v=7.7">
  <link rel="icon" type="image/png" href="/favicon.jpg">
  
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script src="script.js?v=7.7" defer></script>
</head>
<body>

  <div id="loginScreen">
    <div class="login-box">
      <h2>Liceum EIT</h2>
      <input type="password" id="passInput" placeholder="Код доступу">
      <button class="btn btn-primary" onclick="tryLogin()">Увійти</button>
    </div>
  </div>

  <div id="topBar" style="display: none;">
    <div class="brand">LICEUM MANAGER</div>
    <div class="user-controls">
      <span id="roleBadge" class="badge"></span> 
      <button onclick="logout()" class="btn-logout">Вихід</button>
    </div>
  </div>

  <div id="statusBar" style="display: none;"></div>

  <div class="container" id="mainApp" style="display: none;">
    
    <div id="calendar"></div>

    <div class="sidebar">
      
      <div class="sidebar-panel">
        <details open>
          <summary>🔍 Фільтр по вчителю</summary>
          <div class="panel-content">
             <div class="filter-container" id="filterList"></div>
             <button class="btn btn-light" onclick="resetFilters()">Показати всіх</button>
          </div>
        </details>
      </div>

      <div class="sidebar-panel">
        <div class="panel-content">
            <button class="btn btn-primary" onclick="openReport()">📊 Звітність (Таблиця + Excel)</button>
        </div>
      </div>

      <div class="sidebar-panel">
        <details>
          <summary>⚙️ Налаштування</summary>
          <div class="panel-content">
            
            <h4>Список вчителів</h4>
            <div id="teacherList" style="margin-bottom: 10px;"></div>
            
            <div class="input-group">
                <input type="text" id="newTeacherName" placeholder="Прізвище І.">
                <button class="btn btn-success" onclick="addTeacher()">+ Додати</button>
            </div>

            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
            
            <h4>Зміна паролів</h4>
            <div class="input-group">
              <label>Код Техніка</label>
              <div style="display:flex; gap:5px;">
                <input type="text" id="codeTech" placeholder="Новий код">
                <button class="btn btn-secondary" onclick="updateAccessCode('tech', document.getElementById('codeTech').value)">OK</button>
              </div>
            </div>
            <div class="input-group">
                <label>Код Адміна</label>
                <div style="display:flex; gap:5px;">
                  <input type="text" id="codeAdmin" placeholder="Новий код">
                  <button class="btn btn-secondary" onclick="updateAccessCode('admin', document.getElementById('codeAdmin').value)">OK</button>
                </div>
            </div>
             <div class="input-group">
                <label>Код Викладача</label>
                <div style="display:flex; gap:5px;">
                  <input type="text" id="codeTeacher" placeholder="Новий код">
                  <button class="btn btn-secondary" onclick="updateAccessCode('teacher', document.getElementById('codeTeacher').value)">OK</button>
                </div>
            </div>

            <div id="tgPanel" style="display:none; margin-top:15px;">
                <h4>Telegram Bot</h4>
                <input type="text" id="tgToken" placeholder="Bot Token">
                <input type="text" id="tgChatId" placeholder="Chat ID">
                <button class="btn btn-primary" onclick="saveTgSettings()">Зберегти TG</button>
            </div>

          </div>
        </details>
      </div>

      <div class="sidebar-panel">
        <div class="panel-content">
           <button class="btn btn-light" onclick="document.getElementById('instructionModalOverlay').style.display='flex'">❓ Інструкція</button>
        </div>
      </div>

    </div>
  </div>

  <div id="modalOverlay" class="overlay">
    <div class="modal-content modern-modal">
      <div class="modal-header">
        <h3>Новий запис</h3>
        <button onclick="closeModal()" style="background:none; border:none; font-size:20px; cursor:pointer;">✕</button>
      </div>
      <div class="modal-body">
        
        <div class="input-grid">
            <div class="input-group">
                <label>Початок</label>
                <input type="time" id="startTimeInput">
            </div>
            <div class="input-group">
                <label>Кінець</label>
                <input type="time" id="endTimeInput">
            </div>
        </div>

        <div id="adminBlockOptions" style="margin-bottom: 15px; padding: 10px; background: #fee2e2; border-radius: 8px; display: none;">
            <label class="switch">
                <input type="checkbox" id="isBlockTime" onchange="toggleBlockUI(this.checked)">
                <span class="slider"></span>
                <span class="switch-label">⛔ Це технічна перерва</span>
            </label>
        </div>

        <div id="bookingFields">
            <div class="input-group">
                <label>Предмет</label>
                <input type="text" id="eventTitle" placeholder="Напр. Математика">
            </div>
            
            <div class="input-grid">
                <div class="input-group">
                    <label>Вчитель</label>
                    <select id="eventTeacher"></select>
                </div>
                <div class="input-group">
                    <label>Клас / Учень</label>
                    <input type="text" id="eventClass" placeholder="11-А">
                </div>
            </div>

            <div class="input-grid">
                <div class="input-group">
                    <label>Кількість уроків</label>
                    <input type="number" id="eventCount" value="1" min="1">
                </div>
                <div class="input-group">
                    <label>Колір</label>
                    <select id="eventColor">
                        <option value="#4F46E5">🔵 Стандарт</option>
                        <option value="#F59E0B">🟠 Важливо</option>
                        <option value="#EC4899">🌸 Додатковий</option>
                        <option value="#8B5CF6">🟣 Інше</option>
                    </select>
                </div>
            </div>
        </div>

      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Скасувати</button>
        <button class="btn btn-primary" onclick="confirmBooking()">Зберегти</button>
      </div>
    </div>
  </div>

  <div id="statusModalOverlay" class="overlay">
    <div class="modal-content modern-modal">
        <div class="modal-header">
            <h3>Керування</h3>
            <span id="statusTeacherName" class="badge" style="background: #E0E7FF; color: #4F46E5;"></span>
        </div>
        <div class="modal-body">
            <h4 id="statusEventTitle" style="margin-bottom: 15px; font-size: 16px;"></h4>
            
            <div class="input-group">
                <label>Змінити статус</label>
                <select id="eventStatus">
                    <option value="">🟢 Все за планом</option>
                    <option value="✅ Проведено">✅ Проведено</option>
                    <option value="🏃 Запізнююсь (10 хв)">🏃 Запізнююсь (10 хв)</option>
                    <option value="⏳ Запізнююсь (15+ хв)">⏳ Запізнююсь (15+ хв)</option>
                    <option value="❌ Скасовано">❌ Скасовано</option>
                </select>
            </div>
        </div>
        <div class="modal-footer" style="flex-direction: column;">
            <button class="btn btn-primary" onclick="applyStatus()">💾 Оновити статус</button>
            <button id="btnDeleteEvent" class="btn btn-danger" onclick="handleDelete()" style="display:none;">🗑 Видалити урок</button>
            <button class="btn btn-secondary" onclick="closeStatusModal()">Закрити</button>
        </div>
    </div>
  </div>

  <div id="reportOverlay" class="overlay">
    <div class="modal-content" style="max-width: 800px; width: 90%; max-height: 90vh; overflow-y: auto;">
        <div class="modal-header">
            <h3>Аналітика</h3>
            <button onclick="closeReport()" style="background:none; border:none; font-size:20px; cursor:pointer;">✕</button>
        </div>
        <div class="modal-body">
            <div id="reportResult"></div>
            
            <div style="height: 300px; margin-top: 20px;">
                <canvas id="reportChart"></canvas>
            </div>
        </div>
    </div>
  </div>

  <div id="instructionModalOverlay" class="overlay">
    <div class="modal-content">
        <h3>Як користуватися?</h3>
        <p>1. Клікніть на календар, щоб створити урок.</p>
        <p>2. Клікніть на існуючий урок, щоб змінити статус або видалити (протягом 15 хв).</p>
        <button class="btn btn-primary" onclick="document.getElementById('instructionModalOverlay').style.display='none'">Зрозуміло</button>
    </div>
  </div>

</body>
</html>
