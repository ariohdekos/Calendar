<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Liceum Manager v15.0 (Stable)</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="/favicon.jpg">
  
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

  <div id="loginScreen">
    <div class="login-box">
      <h2>Liceum EIT</h2>
      <input type="password" id="passInput" placeholder="Код доступу">
      <button class="btn btn-primary" onclick="manualLogin()">Увійти</button>
      <p id="loginStatus" style="margin-top:10px; font-size:12px; color:#aaa;"></p>
    </div>
  </div>

  <div id="topBar" style="display: none;">
    <div class="brand">LICEUM MANAGER</div>
    <div class="user-controls">
      <button id="settingsBtn" onclick="openSettings()" class="btn-icon" style="display: none;">⚙️</button>
      <button id="reportBtn" onclick="openReport()" class="btn-icon" style="display: none;">📊</button>
      <span id="roleBadge" class="badge"></span> 
      <button onclick="logout()" class="btn-logout">Вихід</button>
    </div>
  </div>

  <div id="mainContainer" style="display: none;">
    <div id="calendar"></div>
  </div>

  <div id="eventModalOverlay" class="overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Запланувати урок</h3>
        <button onclick="closeModal('eventModalOverlay')">✕</button>
      </div>
      <div class="modal-body">
        
        <div class="input-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <label>Предмет</label>
            <span onclick="toggleSubjectMode()" style="font-size: 11px; color:#4F46E5; cursor:pointer; text-decoration: underline;">Свій / Список</span>
          </div>
          <select id="eventSubjectSelect" class="form-control">
            <option value="Математика">Математика</option>
            <option value="Укр. мова">Укр. мова</option>
            <option value="Англійська">Англійська</option>
            <option value="Історія">Історія</option>
            <option value="Фізика">Фізика</option>
            <option value="Хімія">Хімія</option>
            <option value="Біологія">Біологія</option>
            <option value="Інформатика">Інформатика</option>
            <option value="Початкова школа">Початкова школа</option>
            <option value="Підготовка до школи">Підготовка до школи</option>
            <option value="Логопед">Логопед</option>
            <option value="Інше">Інше</option>
          </select>
          <input type="text" id="eventSubjectInput" class="form-control" style="display:none;" placeholder="Назва предмету">
        </div>

        <div class="input-group">
            <label>Клас / Учень</label>
            <input type="text" id="eventClass" class="form-control" placeholder="Напр: 10-А">
        </div>
        
        <div class="input-group">
            <label>Коментар</label>
            <input type="text" id="eventTitle" class="form-control" placeholder="Тема уроку...">
        </div>

        <div class="input-grid">
          <div class="input-group">
            <label>Тривалість</label>
            <select id="eventDuration" class="form-control">
              <option value="45">45 хв</option>
              <option value="60" selected>60 хв</option>
              <option value="90">90 хв</option>
              <option value="120">120 хв</option>
            </select>
          </div>
          <div class="input-group">
            <label>Тип</label>
            <select id="eventType" class="form-control">
              <option value="lesson">Урок</option>
              <option value="tech">Тех. перерва</option>
            </select>
          </div>
        </div>

        <div id="editActions" style="display:none; padding-top:15px; border-top:1px solid #eee; margin-top:10px;">
           <label style="margin-bottom:8px; display:block;">Статус уроку:</label>
           <div style="display:flex; gap:8px; flex-wrap:wrap;">
             <button class="btn-status" onclick="updateStatus('✅ Проведено')">✅ Проведено</button>
             <button class="btn-status" onclick="updateStatus('❌ Скасовано')">❌ Скасовано</button>
           </div>
           <button class="btn-danger btn" onclick="deleteEvent()">🗑 Видалити запис</button>
        </div>
      </div>
      <div class="modal-footer">
        <button id="saveBtn" class="btn btn-primary" style="width:100%" onclick="saveEvent()">Зберегти</button>
      </div>
    </div>
  </div>

  <div id="settingsModal" class="overlay">
    <div class="modal-content">
      <div class="modal-header"><h3>⚙️ Налаштування</h3><button onclick="closeModal('settingsModal')">✕</button></div>
      <div class="modal-body">
        <h4>Telegram Bot</h4>
        <input type="text" id="tgTokenInput" class="form-control" placeholder="Bot Token" style="margin-bottom:10px;">
        <input type="text" id="tgChatIdInput" class="form-control" placeholder="Chat ID">
        <button class="btn btn-primary" onclick="saveSettings()" style="width:100%; margin-top:10px;">Зберегти TG</button>
        
        <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
        
        <h4>Зміна паролів</h4>
        <select id="roleSelect" class="form-control" style="margin-bottom:10px;">
            <option value="teacher">Викладач</option>
            <option value="admin">Адмін</option>
            <option value="tech">Технік</option>
        </select>
        <input type="text" id="newPassInput" class="form-control" placeholder="Новий код">
        <button class="btn btn-secondary" onclick="updateUserPass()" style="width:100%; margin-top:10px;">Оновити пароль</button>
      </div>
    </div>
  </div>

  <div id="reportModal" class="overlay">
    <div class="modal-content" style="max-width: 600px;">
      <div class="modal-header"><h3>📊 Підсумок за місяцями</h3><button onclick="closeModal('reportModal')">✕</button></div>
      <div class="modal-body">
        <p style="font-size:13px; color:#666; margin-bottom:15px;">Кількість записаних уроків за кожен місяць (без урахування скасованих та технічних).</p>
        
        <div class="report-container">
            <table class="report-table">
                <thead>
                    <tr>
                        <th>Місяць / Рік</th>
                        <th>Кількість уроків</th>
                    </tr>
                </thead>
                <tbody id="reportTableBody">
                    </tbody>
            </table>
        </div>

      </div>
      <div class="modal-footer">
          <button class="btn btn-secondary" style="width:100%" onclick="closeModal('reportModal')">Закрити</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
